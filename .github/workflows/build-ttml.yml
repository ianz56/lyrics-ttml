name: Build Process

on:
  push:
    branches: ["main"]
    paths:
      - "**/*.ttml"
      - "generate_index.py"
      - "ttml_to_json.py"
      - "minify_ttml.py"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  convert-minify-index:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Convert TTML to JSON
        run: python ttml_to_json.py --all

      - name: Minify TTML
        run: python minify_ttml.py --src . --dest minify

      - name: Generate Index and Sitemap
        run: python generate_index.py

      - name: Commit and Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add JSON/ index.json sitemap.xml index.html minify/
          
          if ! git diff --staged --quiet; then
            git commit -m "ci: Convert TTML, Minify, and Update index"
            
            # Simple retry to avoid any rare collisions with user pushes
            for i in 1 2 3 4 5; do
              git pull --rebase origin main || true
              git push && break || sleep 5
            done
          fi
