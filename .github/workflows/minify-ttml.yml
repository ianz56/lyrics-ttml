name: Minify TTML

on:
  push:
    branches: ["main"]
    paths:
      - "**/*.ttml"
      - "minify_ttml.py"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  minify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Minify TTML files
        run: python minify_ttml.py --src . --dest minify

      - name: Commit changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add minify/
          if ! git diff --staged --quiet; then
            git commit -m "Auto: Minify TTML files"
            for i in 1 2 3 4 5; do
              git pull --rebase origin main || true
              git push && break || sleep 5
            done
          fi
