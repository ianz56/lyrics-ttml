# A generic, single database configuration.

[alembic]
# path to migration scripts.
# Use forward slashes (/) also on windows to provide an os agnostic path
script_location = alembic

# sys.path prepend — ensures app modules are importable
prepend_sys_path = .

# template used to generate migration file names
file_template = %%(rev)s_%%(slug)s

# the output encoding used when revision files
# are written from script.py.mako
output_encoding = utf-8

# Replaced at runtime from app.config
sqlalchemy.url = postgresql+psycopg2://lyrics:lyrics@localhost:5432/lyrics_ttml

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
