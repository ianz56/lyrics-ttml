version: "3.8"

services:
  db:
    image: postgres:16-alpine
    container_name: lyrics_ttml_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lyrics}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lyrics}
      POSTGRES_DB: ${POSTGRES_DB:-lyrics_ttml}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lyrics} -d ${POSTGRES_DB:-lyrics_ttml}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lyrics_ttml_api
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8001}:8001"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-lyrics}:${POSTGRES_PASSWORD:-lyrics}@db:5432/${POSTGRES_DB:-lyrics_ttml}
      DATABASE_URL_SYNC: postgresql+psycopg2://${POSTGRES_USER:-lyrics}:${POSTGRES_PASSWORD:-lyrics}@db:5432/${POSTGRES_DB:-lyrics_ttml}
      APP_HOST: "0.0.0.0"
      APP_PORT: "8001"
    depends_on:
      db:
        condition: service_healthy
    # Run migrations, import data, then start the API
    command: >
      sh -c "
        alembic upgrade head &&
        python import_ttml.py &&
        uvicorn app.main:app --host 0.0.0.0 --port 8001
      "

volumes:
  postgres_data:
